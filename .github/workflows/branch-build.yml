name: Branch Build

on:
  push:
    branches-ignore:
      - z-acrhive-*
  pull_request:
  workflow_dispatch:

concurrency:
  group: branch-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'z-acrhive-') }}
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has-projects: ${{ steps.discover.outputs.has-projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover version matrix
        id: discover
        shell: pwsh
        run: |
          $excludedVersions = @('1.7.2', '1.7.10')
          $versionsRoot = Join-Path $PWD 'versions'

          function Resolve-JavaVersion {
              param(
                  [string]$Version,
                  [string]$GradlePropertiesPath,
                  [string]$BuildGradlePath
              )

              $buildContent = ''
              $requestedJavaVersion = $null

              if (Test-Path $GradlePropertiesPath) {
                  $javaVersionLine = Get-Content $GradlePropertiesPath | Where-Object { $_ -match '^\s*java_version\s*=\s*(\d+)\s*$' } | Select-Object -First 1
                  if ($javaVersionLine -match '(\d+)') {
                      $requestedJavaVersion = [int]$Matches[1]
                  }
              }

              if (Test-Path $BuildGradlePath) {
                  $buildContent = Get-Content $BuildGradlePath -Raw
                  if (-not $requestedJavaVersion -and $buildContent -match 'JavaLanguageVersion\.of\((\d+)\)') {
                      $requestedJavaVersion = [int]$Matches[1]
                  }
              }

              if (-not $requestedJavaVersion) {
                  $requestedJavaVersion = switch -Regex ($Version) {
                      '^1\.(17\.1|18\.2|19\.2|19\.4|20\.1)$' { 17; break }
                      '^1\.(20\.6|21\.1|21\.5|21\.11)$' { 21; break }
                      default { 8 }
                  }
              }

              if ($buildContent -match "id\s+['""]fabric-loom['""]") {
                  return [Math]::Max(17, $requestedJavaVersion)
              }

              return $requestedJavaVersion
          }

          $matrixInclude = @(
              Get-ChildItem -Path $versionsRoot -Directory |
                  Sort-Object Name |
                  Where-Object {
                      $projectPath = Join-Path $_.FullName 'project'
                      (Test-Path (Join-Path $projectPath 'gradlew.bat')) -and
                      ($excludedVersions -notcontains $_.Name)
                  } |
                  ForEach-Object {
                      $projectPath = Join-Path $_.FullName 'project'
                      $javaVersion = Resolve-JavaVersion `
                          -Version $_.Name `
                          -GradlePropertiesPath (Join-Path $projectPath 'gradle.properties') `
                          -BuildGradlePath (Join-Path $projectPath 'build.gradle')

                      [PSCustomObject]@{
                          version = $_.Name
                          java = [string]$javaVersion
                      }
                  }
          )

          $matrix = @{
              include = $matrixInclude
          } | ConvertTo-Json -Compress -Depth 4
          $hasProjects = if ($matrixInclude.Count -gt 0) { 'true' } else { 'false' }

          "matrix=$matrix" >> $env:GITHUB_OUTPUT
          "has-projects=$hasProjects" >> $env:GITHUB_OUTPUT

          Write-Host "Discovered build matrix: $matrix"

  build:
    needs: discover
    if: ${{ needs.discover.outputs.has-projects == 'true' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Prepare downloadServer cache
        if: ${{ contains(fromJson('["1.16.4","1.16.5","1.17.1","1.18.2"]'), matrix.version) }}
        shell: pwsh
        run: .\tools\Ensure-MinecraftServerCache.ps1 -Version '${{ matrix.version }}' -GradleUserHome "$env:USERPROFILE\.gradle"

      - name: Build ${{ matrix.version }}
        shell: pwsh
        working-directory: versions/${{ matrix.version }}/project
        run: .\gradlew.bat build

      - name: Upload artifact ${{ matrix.version }}
        uses: actions/upload-artifact@v4
        with:
          name: easylan-${{ github.ref_name }}-${{ matrix.version }}
          path: |
            versions/${{ matrix.version }}/project/build/libs/*.jar
            !versions/${{ matrix.version }}/project/build/libs/*-sources.jar
          if-no-files-found: error
          retention-days: 14
