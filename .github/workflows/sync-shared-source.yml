name: Sync Shared Source

on:
  push:
    branches:
      - main
    paths:
      - 'shared-source/**'
      - 'tools/shared-sync-map.json'
      - 'tools/SharedSyncCommon.ps1'
      - 'tools/Apply-SharedSource.ps1'
      - 'tools/Sync-SharedSource.ps1'
  workflow_dispatch:
    inputs:
      profile:
        description: Sync target group
        required: true
        default: all
        type: choice
        options:
          - all
          - forge
          - fabric
          - neoforge
      branches:
        description: Optional custom branches (comma, space, or newline separated)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: sync-shared-source-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: windows-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync shared-source to active branches
        shell: pwsh
        env:
          INPUT_PROFILE: ${{ inputs.profile }}
          INPUT_BRANCHES: ${{ inputs.branches }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          $profile = if ([string]::IsNullOrWhiteSpace($env:INPUT_PROFILE)) { 'all' } else { $env:INPUT_PROFILE }
          .\tools\Sync-SharedSource.ps1 -Profile $profile -Branches $env:INPUT_BRANCHES -Push
